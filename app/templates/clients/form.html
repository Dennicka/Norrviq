{% extends "base.html" %}
{% block content %}
<h1>{{ client and t("clients.edit") or t("clients.new") }}</h1>
<form method="post">
    <div>
        <label>{{ t("label.name") }}</label>
        <input type="text" name="name" value="{{ client.name if client else '' }}" required>
    </div>
    <div>
        <label>{{ t("label.contact_person") }}</label>
        <input type="text" name="contact_person" value="{{ client.contact_person if client else '' }}">
    </div>
    <div>
        <label>{{ t("label.phone") }}</label>
        <input type="text" name="phone" value="{{ client.phone if client else '' }}">
    </div>
    <div>
        <label>{{ t("label.email") }}</label>
        <input type="email" name="email" value="{{ client.email if client else '' }}">
    </div>
    <div>
        <label>{{ t("label.address") }}</label>
        <input type="text" name="address" value="{{ client.address if client else '' }}">
    </div>
    <div>
        <label>
            <input type="checkbox" name="is_private_person" {% if client and client.is_private_person %}checked{% endif %}>
            {{ t("label.is_private_person") }}
        </label>
    </div>
    <div>
        <label>
            <input type="checkbox" name="is_rot_eligible" {% if client is none or client.is_rot_eligible %}checked{% endif %}>
            {{ t("label.is_rot_eligible") }}
        </label>
    </div>
    <div>
        <label>{{ t("label.comment") }}</label>
        <textarea name="comment">{{ client.comment if client else '' }}</textarea>
    </div>
    <div class="actions">
        <button type="submit">{{ client and t("label.save") or t("label.create") }}</button>
        <a href="/clients/">{{ t("label.back") }}</a>
    </div>
</form>
{% endblock %}
