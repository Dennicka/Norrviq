{% extends "base.html" %}
{% block content %}
<h1>{{ t('projects.edit') }}: {{ t('label.work_type') }}</h1>
<p><a href="/projects/{{ project.id }}">{{ t('projects.detail') }}</a></p>
<form method="post" action="/projects/{{ project.id }}/items/{{ item.id }}/edit" data-autosave="true" data-autosave-entity="work-item" data-autosave-id="{{ item.id }}" data-autosave-fieldhash="main" data-server-updated-at="" data-autosave-endpoint="/api/projects/{{ project.id }}/work-items/{{ item.id }}">
    {{ csrf_input(request) }}
    <div>
        <label>{{ t("label.room") }}</label>
        <select name="room_id">
            <option value="">{{ t('rooms.no_room') }}</option>
            {% for room in rooms %}
            <option value="{{ room.id }}" {% if item.room_id == room.id %}selected{% endif %}>{{ room.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div>
        <label>{{ t("label.work_type") }}</label>
        <select name="work_type_id" required>
            <option value="">—</option>
            {% for wt in worktypes %}
            <option value="{{ wt.id }}" {% if item.work_type_id == wt.id %}selected{% endif %}>
                {{ wt.name_ru if lang == 'ru' else wt.name_sv }}
            </option>
            {% endfor %}
        </select>
    </div>
    <div>
        <label>{{ t("label.quantity") }}</label>
        <input type="number" step="0.01" name="quantity" value="{{ item.quantity }}" required>
    </div>
    <div>
        <label>{{ t("label.difficulty") }}</label>
        <input type="number" step="0.01" name="difficulty_factor" value="{{ item.difficulty_factor }}">
    </div>
    <div>
        <label>{{ t("projects.work_items.pricing_mode") }}</label>
        <select name="pricing_mode" data-pricing-mode>
            <option value="hourly" {% if item.pricing_mode == 'hourly' %}selected{% endif %}>{{ t("projects.work_items.pricing_mode.hourly") }}</option>
            <option value="area" {% if item.pricing_mode == 'area' %}selected{% endif %}>{{ t("projects.work_items.pricing_mode.area") }}</option>
            <option value="fixed" {% if item.pricing_mode == 'fixed' %}selected{% endif %}>{{ t("projects.work_items.pricing_mode.fixed") }}</option>
        </select>
    </div>
    <div data-pricing-field="hourly">
        <label>{{ t("projects.work_items.hourly_rate") }}</label>
        <input type="number" step="0.01" name="hourly_rate_sek" value="{{ item.hourly_rate_sek or '' }}">
    </div>
    <div data-pricing-field="area">
        <label>{{ t("projects.work_items.area_rate") }}</label>
        <input type="number" step="0.01" name="area_rate_sek" value="{{ item.area_rate_sek or '' }}">
    </div>
    <div data-pricing-field="fixed">
        <label>{{ t("projects.work_items.fixed_price") }}</label>
        <input type="number" step="0.01" name="fixed_price_sek" value="{{ item.fixed_price_sek or '' }}">
    </div>
    <div>
        <label>{{ t("label.comment") }}</label>
        <textarea name="comment">{{ item.comment or '' }}</textarea>
    </div>
    <div data-autosave-restore hidden>Restore draft? <button type="button" data-restore>Restore</button> <button type="button" data-discard>Discard</button></div>
    <div data-autosave-status></div>
    <div data-autosave-form-error class="autosave-field-error"></div>
    <div class="actions">
        <button type="submit">{{ t('label.save') }}</button>
        <a href="/projects/{{ project.id }}">{{ t('label.back') }}</a>
    </div>
</form>
{% endblock %}

{% block extra_head %}<script defer src="{{ url_for('static', path='js/autosave.js') }}"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    const mode = document.querySelector('[data-pricing-mode]');
    const fields = document.querySelectorAll('[data-pricing-field]');
    if (!mode) return;
    const sync = function () {
        fields.forEach((node) => {
            node.style.display = node.dataset.pricingField === mode.value ? 'block' : 'none';
        });
    };
    mode.addEventListener('change', sync);
    sync();
});
</script>{% endblock %}
