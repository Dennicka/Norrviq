{% extends "base.html" %}
{% block content %}
<h1>{{ t('projects.worker_assignments.edit') }}</h1>
<form method="post" action="/projects/{{ project.id }}/hours/{{ assignment.id }}/save">
    <div>
        <label>{{ t('label.worker') }}</label>
        <select name="worker_id" required>
            <option value="">—</option>
            {% for worker in workers %}
            <option value="{{ worker.id }}" {% if assignment.worker_id == worker.id %}selected{% endif %}>{{ worker.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div>
        <label>{{ t('label.planned_hours') }}</label>
        <input type="number" step="0.01" name="planned_hours" value="{{ assignment.planned_hours or '' }}">
    </div>
    <div>
        <label>{{ t('label.actual_hours') }}</label>
        <input type="number" step="0.01" name="actual_hours" value="{{ assignment.actual_hours or '' }}" required>
    </div>
    <button type="submit">{{ t('label.save') }}</button>
    <a href="/projects/{{ project.id }}">{{ t('label.back') }}</a>
</form>
{% endblock %}
