<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t("title.app") }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/main.css') }}">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-links">
            <a href="#">{{ t("menu.projects") }}</a>
            <a href="#">{{ t("menu.finance") }}</a>
            <a href="#">{{ t("menu.workers") }}</a>
            <a href="#">{{ t("menu.settings") }}</a>
        </div>
        <div class="lang-switcher">
            <a href="/lang/ru" class="{{ 'active' if lang == 'ru' else '' }}">RU</a>
            <span>|</span>
            <a href="/lang/sv" class="{{ 'active' if lang == 'sv' else '' }}">SV</a>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
