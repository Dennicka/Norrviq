<!doctype html><html><body>
<h1>Shopping List — {{ project.name }}</h1>
<table>
<tr><th>Material</th><th>Packs</th><th>Pack size</th><th>Supplier</th><th>Total ex VAT</th></tr>
{% for i in shopping_list.items %}<tr><td>{{ i.material_name }}</td><td>{{ i.packs_count }}</td><td>{{ i.pack_size or '-' }}</td><td>{{ i.supplier_name or '-' }}</td><td>{{ i.total_ex_vat }}</td></tr>{% endfor %}
</table>
<p>Total ex VAT: {{ shopping_list.total_ex_vat }}</p>
</body></html>
