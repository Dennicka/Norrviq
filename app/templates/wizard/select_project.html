{% extends "base.html" %}
{% block content %}
<h1>{{ t('wizard.title') }}</h1>
<p>{{ t('wizard.select_project') }}</p>
<ul>
  {% for project in projects %}
  <li><a href="/projects/{{ project.id }}/wizard?step={{ wizard_step }}&lang={{ lang }}">{{ project.name }}</a></li>
  {% endfor %}
</ul>
{% endblock %}
