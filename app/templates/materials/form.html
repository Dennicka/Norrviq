{% extends "base.html" %}
{% block content %}
<h1>{{ material and t('materials.edit') or t('materials.create') }}</h1>
<form method="post" action="{{ material and ('/materials/' ~ material.id ~ '/edit') or '/materials/create' }}">
    <div>
        <label>{{ t('label.code') }}</label>
        <input type="text" name="code" value="{{ material.code if material else '' }}" required>
    </div>
    <div>
        <label>{{ t('label.name_ru') }}</label>
        <input type="text" name="name_ru" value="{{ material.name_ru if material else '' }}" required>
    </div>
    <div>
        <label>{{ t('label.name_sv') }}</label>
        <input type="text" name="name_sv" value="{{ material.name_sv if material else '' }}" required>
    </div>
    <div>
        <label>{{ t('label.category') }}</label>
        <input type="text" name="category" value="{{ material.category if material else '' }}">
    </div>
    <div>
        <label>{{ t('label.unit') }}</label>
        <input type="text" name="unit" value="{{ material.unit if material else '' }}" required>
    </div>
    <div>
        <label>{{ t('label.default_price_per_unit') }}</label>
        <input type="number" step="0.01" name="default_price_per_unit" value="{{ material.default_price_per_unit if material else '' }}">
    </div>
    <div>
        <label>{{ t('label.moms_percent') }}</label>
        <input type="number" step="0.01" name="moms_percent" value="{{ material.moms_percent if material else '' }}">
    </div>
    <div>
        <label>
            <input type="checkbox" name="is_active" {% if material is none or material.is_active %}checked{% endif %}> {{ t('label.active') }}
        </label>
    </div>
    <div>
        <label>{{ t('label.comment') }}</label>
        <textarea name="comment">{{ material.comment if material else '' }}</textarea>
    </div>
    <button type="submit">{{ t('label.save') }}</button>
</form>
{% endblock %}
