{% extends "base.html" %}
{% block content %}
<h1>{{ t('materials.norms.title') }}</h1>
{% if errors %}
<div class="flash flash-error">Validation error: {{ errors|join(', ') }}</div>
{% endif %}
<form method="post">
  {{ csrf_input(request) }}
  {% set form = form_data if form_data else {} %}
  <label><input type="checkbox" name="is_active" {% if (form.get('is_active') in ['on','true','1']) or (not form and (not norm or norm.is_active or norm.active)) %}checked{% endif %}>{{ t('label.active') }}</label>
  <label>{{ t('label.material') }}<input name="material_name" value="{{ form.get('material_name') if form else (norm.material_name if norm else '') }}" required></label>
  <label>{{ t('label.category') }}<input name="material_category" value="{{ form.get('material_category') if form else (norm.material_category if norm else '') }}"></label>
  <label>Work kind
    <select name="work_kind" required>
      {% for v in ['painting_ceiling','painting_walls','putty_walls','primer_walls','floor_covering'] %}
      {% set selected = (form.get('work_kind') == v) or (not form and norm and norm.work_kind == v) %}
      <option value="{{ v }}" {% if selected %}selected{% endif %}>{{ v }}</option>
      {% endfor %}
    </select>
  </label>
  <label>Basis type
    <select name="basis_type" required>
      {% for v in ['floor_area','ceiling_area','wall_area','opening_area','perimeter','manual_quantity'] %}
      {% set selected = (form.get('basis_type') == v) or (not form and norm and norm.basis_type == v) %}
      <option value="{{ v }}" {% if selected %}selected{% endif %}>{{ v }}</option>
      {% endfor %}
    </select>
  </label>
  <label>Norm (qty per basis)<input type="number" step="0.0001" name="quantity_per_basis" value="{{ form.get('quantity_per_basis') if form else (norm.quantity_per_basis if norm else '') }}" required></label>
  <label>Basis unit<input name="basis_unit" value="{{ form.get('basis_unit') if form else (norm.basis_unit if norm else 'm2') }}" required></label>
  <label>{{ t('label.material_unit') }}<input name="material_unit" value="{{ form.get('material_unit') if form else (norm.material_unit if norm else '') }}" required></label>
  <label>Waste %<input type="number" step="0.01" name="waste_factor_pct" value="{{ form.get('waste_factor_pct') if form else (norm.waste_factor_pct if norm else '0') }}"></label>
  <label>{{ t('label.notes') }}<textarea name="notes">{{ form.get('notes') if form else (norm.notes if norm else '') }}</textarea></label>
  <button type="submit">{{ t('label.save') }}</button>
</form>
{% endblock %}
