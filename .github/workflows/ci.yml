name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PDF system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2 libpango-1.0-0 libpangoft2-1.0-0 libgdk-pixbuf-2.0-0 libffi8 shared-mime-info fonts-dejavu
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Dependency sanity check
        run: python -c "import weasyprint, pydyf; print('weasyprint', weasyprint.__version__, 'pydyf', pydyf.__version__)"
      - name: Ruff lint
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PDF system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2 libpango-1.0-0 libpangoft2-1.0-0 libgdk-pixbuf-2.0-0 libffi8 shared-mime-info fonts-dejavu
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Dependency sanity check
        run: python -c "import weasyprint, pydyf; print('weasyprint', weasyprint.__version__, 'pydyf', pydyf.__version__)"
      - name: Run migrations on clean DB
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          export DATABASE_URL=sqlite:///./ci.sqlite3
          alembic upgrade head
      - name: Run golden regression suite
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          export DATABASE_URL=sqlite:///./ci.sqlite3
          pytest tests/regression/test_golden_regression.py
      - name: Run tests
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          export DATABASE_URL=sqlite:///./ci.sqlite3
          pytest
