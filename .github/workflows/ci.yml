name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Ruff lint
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run migrations on clean DB
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          export DATABASE_URL=sqlite:///./ci.sqlite3
          alembic upgrade head
      - name: Run golden regression suite
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          export DATABASE_URL=sqlite:///./ci.sqlite3
          pytest tests/regression/test_golden_regression.py
      - name: Run tests
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          export DATABASE_URL=sqlite:///./ci.sqlite3
          pytest
