name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install Chromium for Playwright
        run: python -m playwright install chromium
      - name: Lint
        run: make lint
      - name: Test
        env:
          PYTHONPATH: .
          DATABASE_URL: sqlite:///./ci.sqlite3
          PDF_ENGINE: playwright
        run: make test
      - name: Alembic single head check
        run: make alembic-check

  perf:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run perf tests
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          export DATABASE_URL=sqlite:///./ci-perf.sqlite3
          export RUN_PERF_TESTS=1
          pytest -m perf -q
